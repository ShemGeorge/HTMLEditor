<!DOCTYPE html>
<html>
<head>
<title>HTMLEditor Iframe Preview</title>
</head>
<body>
<script>
window.addEventListener("message", (e) => {
var { html, cssURL, jsURL } = e.data;
document.open();
document.write(`<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="${cssURL}">
</head>
<body>
${html}
<script src="${jsURL}" defer="true"><\/script>
</body>
</html>`);
document.close();
});
</script>
</body>
</html>
