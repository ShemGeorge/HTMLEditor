<!DOCTYPE html>
<html>
<head>
<title>HTMLEditor Iframe Preview</title>
</head>
<body>
<script>
window.addEventListener("message", (e) => {
var { html, css, js } = e.data;
var cssBlob = new Blob([css], { type: "text/css" });
var jsBlob = new Blob([js], { type: "application/javascript" });
var cssURL = URL.createObjectURL(cssBlob);
var jsURL = URL.createObjectURL(jsBlob);
document.open();
document.write(`<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="${cssURL}">
</head>
<body>
${html}
<script src="${jsURL}" defer="true"><\/script>
</body>
</html>`);
document.close();
URL.revokeObjectURL(cssURL);
URL.revokeObjectURL(jsURL);
});
</script>
</body>
</html>
