name: Build HTMLEditor Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm install
      - run: npm run dist -- --publish never
      - name: Upload Windows installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTMLEditor-Windows
          path: dist/*.Windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm install
      - run: npm run dist -- --publish never
      - name: Upload macOS installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTMLEditor-Mac
          path: dist/*.Mac.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm install
      - run: npm run dist -- --publish never
      - name: Show dist folder for debugging
        run: ls -la dist
      - name: Upload Linux installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTMLEditor-Linux
          path: dist/*.Linux.*
